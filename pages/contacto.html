<html lang="en">

      rel="stylesheet"
    />
    <link

  <body>
    <header>
      <div class="div-logo">
        <a class="logo" href="../index.html">BOOK!S</a>

      <nav class="header-nav">
        <ul>
          <li>
            <a href="../index.html">Inicio</a>
          </li>
          <li>

          <li>

              <i class="fa-solid fa-cart-shopping"></i>
            </a>
          </li>
        </ul>
      </nav>
    </header>
    <main>
      <h1 class="titulo-contacto color-subtitulo">Contactenos</h1>
      <form
        class="form-contacto"
        action="https://formspree.io/f/mlgolzzq"
        method="POST"
      >
        <div class="grupo-input">
          <!--agregamos div aca para l flex, para relacion padre-hijo-->
          <label>
            Your email:
            <input type="email" name="email" />
          </label>
        </div>
        <div class="grupo-input">
          <label>
            Your message:
            <textarea name="message"></textarea>
          </label>
        </div>
        <!-- your other form fields go here -->
        <button class="btn" type="submit">Send</button>
      </form>
    </main>
    <footer>
      <p class="text-footer">Visitanos en nuestras redes sociales</p>
      <nav>
        <ul class="footer-list">
          <li>
            <a href="https://web.whatsapp.com" target="_blank">
              <img src="../img/whatsapp.png" alt="logo whatsapp" />
            </a>
          </li>
          <li>
            <a href="https://www.instagram.com" target="_blank">
              <img src="../img/social.png" alt="logo instagram" />
            </a>
          </li>
        </ul>
      </nav>
    </footer>
